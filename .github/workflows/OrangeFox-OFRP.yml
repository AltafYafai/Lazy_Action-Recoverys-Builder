name: OrangeFox [OFRP]

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch'
        required: true
        default: '14.1'
        type: choice
        options:
        - 14.1
        - 12.1
        - 11.0
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/AltafYafai/device_xiaomi_sky-recovery'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'ofox-14.1'
      DEVICE_PATH:
        description: 'Specify your device path.'
        required: true
        default: 'device/xiaomi/sky'
      DEVICE_NAME:
        description: 'Specify your Device Codename.'
        required: true
        default: 'sky'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot
      LDCHECK:
        description: 'Use LDCHECK'
        required: false
        default: 'false'
        type: boolean
      LDCHECKPATH:
        description: 'Path of blobs to check'
        required: true
        default: 'recovery/root'

jobs:
  build:
    name: Build OFRP by ${{ github.actor }}
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v3
              
    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12
      
    - name: Build Environment
      run: |
        sudo apt install aria2 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
      
    - name: Set-up Manifest
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "lazycodebuilder"
        git config --global user.email "154446636+lazycodebuilder@users.noreply.github.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}

    - name: Clone Device Tree
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone ${{ github.event.inputs.DEVICE_TREE }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
        cd ${{ github.event.inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Sync Missing Dependencies
      if: github.event.inputs.MANIFEST_BRANCH == '14.1'
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone https://android.googlesource.com/platform/external/guava external/guava

    - name: Set Lunch Command
      id: set_lunch
      run: |
        if [ "${{ github.event.inputs.MANIFEST_BRANCH }}" == "14.1" ]; then
          echo "LUNCH_CMD=lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-ap2a-eng" >> $GITHUB_OUTPUT
        else
          echo "LUNCH_CMD=lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-eng" >> $GITHUB_OUTPUT
        fi

    - name: Building OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export WITHOUT_CHECKBUILD=true
        set -e
        ${{ steps.set_lunch.outputs.LUNCH_CMD }}
        make clean
        mka adbd ${{ github.event.inputs.BUILD_TARGET }}image

    - name: Set Build Date 
      run: |
        echo "BUILD_DATE=$(TZ=Asia/Manila date +%Y%m%d)" >> $GITHUB_ENV

    - name: Diagnostic Output
      run: |
        echo "=== Listing Output Files ==="
        find ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/ -maxdepth 3 -name "*.img" -o -name "*.zip"
        
    - name: Prepare Artifacts
      id: prep
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/
        mkdir -p ${GITHUB_WORKSPACE}/artifacts/
        cp recovery.img ${GITHUB_WORKSPACE}/artifacts/ 2>/dev/null || true
        cp OrangeFox*.img ${GITHUB_WORKSPACE}/artifacts/ 2>/dev/null || true
        cp OrangeFox*.zip ${GITHUB_WORKSPACE}/artifacts/ 2>/dev/null || true
        if [ "$(ls -A ${GITHUB_WORKSPACE}/artifacts/)" ]; then
          echo "FILES_FOUND=true" >> $GITHUB_OUTPUT
        else
          echo "FILES_FOUND=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload Release
      if: steps.prep.outputs.FILES_FOUND == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ github.workspace }}/artifacts/*
        name: Unofficial OrangeFox for ${{ github.event.inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          Build: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device Tree: ${{ github.event.inputs.DEVICE_TREE }}
          Commit: ${{ env.COMMIT_ID }}

    - name: Run LDCheck
      if: github.event.inputs.LDCHECK == 'true'
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery/root
        # LDCheck logic here
      continue-on-error: true
