name: Build OrangeFox Sky

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git-core repo bc bison build-essential curl flex g++-multilib \
        gcc-multilib gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev \
        lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 \
        libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Setup repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Sync OrangeFox
      run: |
        git clone https://gitlab.com/OrangeFox/sync.git ~/OrangeFox_sync
        cd ~/OrangeFox_sync
        ./orangefox_sync.sh --branch 12.1 --path ~/fox_12.1

    - name: Clone device tree
      run: |
        cd ~/fox_12.1
        git clone https://github.com/AltafYafai/device_xiaomi_sky-recovery.git -b TWRP device/xiaomi/sky

    - name: Build Recovery
      run: |
        cd ~/fox_12.1
        source build/envsetup.sh
        lunch twrp_sky-eng
        mka recoveryimage

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-sky
        path: ~/fox_12.1/out/target/product/sky/recovery.img
